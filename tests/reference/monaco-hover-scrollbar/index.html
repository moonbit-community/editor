<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monaco Hover Scrollbar Oracle</title>
    <style>
      :root {
        --vscode-foreground: #cccccc;
        --vscode-focusBorder: #0078d4;
        --vscode-editor-background: #1f1f1f;
        --vscode-editor-foreground: #cccccc;
        --vscode-editorLineNumber-foreground: #6e7681;
        --vscode-editorHoverWidget-background: #202020;
        --vscode-editorHoverWidget-foreground: #cccccc;
        --vscode-editorHoverWidget-border: #313131;
        --vscode-editorHoverWidget-statusBarBackground: #2b2b2b;
        --vscode-scrollbarSlider-background: #79797966;
        --vscode-scrollbarSlider-hoverBackground: #646464b3;
        --vscode-scrollbarSlider-activeBackground: #bfbfbf66;
        --vscode-scrollbar-background: #7979791a;
        --vscode-scrollbar-shadow: rgb(0 0 0 / 50%);
        --vscode-shadow-hover: rgb(0 0 0 / 36%);
        --vscode-cornerRadius-large: 4px;
        --vscode-textCodeBlock-background: #2d2d2d;
        --vscode-textLink-foreground: #4e94ce;
        --vscode-textLink-activeForeground: #4e94ce;
        --vscode-toolbar-hoverBackground: #ffffff1a;
        --editor-font-family: Menlo, Monaco, "Courier New", monospace;
        --monaco-monospace-font: var(--editor-font-family);
        --editor-font-size: 12px;
        --editor-line-height: 18px;
        --ui-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      :root[data-theme="light"] {
        --vscode-foreground: #3b3b3b;
        --vscode-focusBorder: #005fb8;
        --vscode-editor-background: #ffffff;
        --vscode-editor-foreground: #3b3b3b;
        --vscode-editorLineNumber-foreground: #6e7681;
        --vscode-editorHoverWidget-background: #f8f8f8;
        --vscode-editorHoverWidget-foreground: #3b3b3b;
        --vscode-editorHoverWidget-border: #e5e5e5;
        --vscode-editorHoverWidget-statusBarBackground: #f0f0f0;
        --vscode-scrollbarSlider-background: #64646466;
        --vscode-scrollbarSlider-hoverBackground: #646464b3;
        --vscode-scrollbarSlider-activeBackground: #00000099;
        --vscode-scrollbar-background: #6464641a;
        --vscode-scrollbar-shadow: rgb(0 0 0 / 20%);
        --vscode-shadow-hover: rgb(0 0 0 / 16%);
        --vscode-textCodeBlock-background: #f3f3f3;
        --vscode-textLink-foreground: #006ab1;
        --vscode-textLink-activeForeground: #0000ff;
        --vscode-toolbar-hoverBackground: #00000014;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--vscode-editor-background);
      }

      #container {
        position: relative;
        width: 820px;
        height: 520px;
        background: var(--vscode-editor-background);
      }

      .monaco-editor {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background: var(--vscode-editor-background);
      }

      .monaco-scrollable-element {
        position: relative;
        overflow: hidden;
      }

      .monaco-scrollable-element.editor-scrollable {
        position: absolute;
        inset: 0;
      }

      .lines-content,
      .view-lines {
        position: absolute;
        top: 0;
        left: 0;
      }

      .view-line {
        position: absolute;
        left: 0;
        height: var(--editor-line-height);
        color: var(--vscode-editor-foreground);
        font: var(--editor-font-size) / var(--editor-line-height)
          var(--editor-font-family);
        white-space: pre;
      }

      .monaco-scrollable-element > .visible {
        opacity: 1;
        background: rgb(0 0 0 / 0%);
        transition: opacity 100ms linear;
        z-index: 11;
      }

      .monaco-scrollable-element > .invisible {
        opacity: 0;
        pointer-events: none;
      }

      .monaco-scrollable-element > .invisible.fade {
        transition: opacity 800ms linear;
      }

      .monaco-scrollable-element > .scrollbar {
        position: absolute;
        background: var(--vscode-scrollbar-background);
      }

      .monaco-scrollable-element > .scrollbar > .slider {
        position: absolute;
        top: 0;
        left: 0;
        contain: strict;
        background: var(--vscode-scrollbarSlider-background);
      }

      .monaco-scrollable-element > .scrollbar > .slider:hover {
        background: var(--vscode-scrollbarSlider-hoverBackground);
      }

      .monaco-scrollable-element > .scrollbar > .slider.active,
      .monaco-scrollable-element > .scrollbar > .slider:active {
        background: var(--vscode-scrollbarSlider-activeBackground);
      }

      .monaco-scrollable-element > .shadow {
        position: absolute;
        display: none;
      }

      .monaco-scrollable-element > .shadow.top {
        display: block;
        top: 0;
        left: 3px;
        height: 3px;
        width: 100%;
        box-shadow: var(--vscode-scrollbar-shadow) 0 6px 6px -6px inset;
      }

      .monaco-scrollable-element > .shadow.left {
        display: block;
        top: 3px;
        left: 0;
        height: 100%;
        width: 3px;
        box-shadow: var(--vscode-scrollbar-shadow) 6px 0 6px -6px inset;
      }

      .monaco-scrollable-element > .shadow.top-left-corner {
        display: block;
        top: 0;
        left: 0;
        width: 3px;
        height: 3px;
      }

      .monaco-resizable-hover {
        position: absolute;
        z-index: 50;
        min-width: 150px;
        box-sizing: content-box;
        border: 1px solid var(--vscode-editorHoverWidget-border);
        border-radius: var(--vscode-cornerRadius-large);
        background-color: var(--vscode-editorHoverWidget-background);
        cursor: default;
        user-select: text;
      }

      .monaco-hover {
        position: relative;
        overflow: hidden;
        box-sizing: border-box;
        line-height: 1.5em;
        white-space: var(--vscode-hover-whiteSpace, normal);
        color: var(--vscode-editorHoverWidget-foreground);
        background-color: var(--vscode-editorHoverWidget-background);
        border: none;
        border-radius: inherit;
        box-shadow: 0 2px 8px var(--vscode-shadow-hover);
        font: var(--editor-font-size) / 1.5 var(--ui-font-family);
      }

      .monaco-hover.fade-in {
        animation: fadein 100ms linear;
      }

      @keyframes fadein {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .monaco-hover-content {
        overflow: auto;
        scrollbar-width: none;
      }

      .monaco-hover-content::-webkit-scrollbar {
        width: 0;
        height: 0;
      }

      .hover-row {
        display: flex;
        border-radius: var(--vscode-cornerRadius-large);
      }

      .hover-row-contents {
        display: flex;
        min-width: 0;
        flex-direction: column;
      }

      .markdown-hover > .hover-contents:not(.code-hover-contents) {
        max-width: var(--vscode-hover-maxWidth, 500px);
        word-wrap: break-word;
      }

      .hover-contents {
        padding: 4px 8px;
      }

      .monaco-hover p,
      .monaco-hover ul,
      .monaco-hover ol,
      .monaco-hover h3 {
        margin: 8px 0;
      }

      .monaco-hover p:first-child,
      .monaco-hover ul:first-child,
      .monaco-hover ol:first-child {
        margin-top: 0;
      }

      .monaco-hover p:last-child,
      .monaco-hover ul:last-child,
      .monaco-hover ol:last-child {
        margin-bottom: 0;
      }

      .monaco-hover ul,
      .monaco-hover ol {
        padding-left: 20px;
      }

      .monaco-hover code {
        padding: 0 0.4em;
        border-radius: 3px;
        background: var(--vscode-textCodeBlock-background);
        font-family: var(--monaco-monospace-font);
      }

      .monaco-tokenized-source {
        display: inline-block;
        min-width: max-content;
        padding: 6px 8px;
        border-radius: 3px;
        background: var(--vscode-textCodeBlock-background);
        font-family: var(--monaco-monospace-font);
        white-space: var(--vscode-hover-sourceWhiteSpace, pre-wrap);
      }

      .monaco-hover a {
        color: var(--vscode-textLink-foreground);
      }

      .monaco-hover a:hover {
        color: var(--vscode-textLink-activeForeground);
      }

      .monaco-hover .hover-row.status-bar {
        font-size: 12px;
        line-height: 22px;
      }

      .monaco-hover .hover-row.status-bar .actions {
        display: flex;
        box-sizing: border-box;
        width: 100%;
        padding: 0 8px;
        background-color: var(--vscode-editorHoverWidget-statusBarBackground);
      }

      .monaco-hover .hover-row.status-bar .actions .action-container {
        margin-right: 16px;
        cursor: pointer;
        overflow: hidden;
        text-wrap: nowrap;
        text-overflow: ellipsis;
      }

      .monaco-hover .hover-row.hover-row-with-copy {
        position: relative;
        padding-right: 20px;
      }

      .monaco-hover .hover-copy-button {
        position: absolute;
        top: 4px;
        right: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2px 4px;
        border: 0;
        border-radius: 3px;
        background: transparent;
        color: var(--vscode-foreground);
        opacity: 0;
      }

      .monaco-hover .hover-row-with-copy:hover .hover-copy-button,
      .monaco-hover .hover-row-with-copy:focus-within .hover-copy-button {
        opacity: 1;
      }

      .monaco-hover .hover-copy-button:hover {
        background-color: var(--vscode-toolbar-hoverBackground);
        cursor: pointer;
      }

      .monaco-hover .hover-copy-button:focus {
        outline: 1px solid var(--vscode-focusBorder);
        outline-offset: -1px;
      }
    </style>
  </head>
  <body>
    <main id="container" class="monaco-editor" aria-label="Monaco oracle"></main>
    <script src="./conformance-oracle.js"></script>
  </body>
</html>
